<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #fdf6f0; }
  #messages { height: 70vh; overflow-y: auto; padding: 10px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 12px; max-width: 80%; line-height: 1.5; }
  .user { background: #c08b72; color: white; margin-left: auto; }
  .ai { background: white; color: #4a3728; }
  #input-area { display: flex; gap: 8px; margin-top: 10px; }
  #input { flex: 1; padding: 10px; border: 1px solid #d4b8a0; border-radius: 8px; font-size: 16px; }
  button { padding: 10px 20px; background: #c08b72; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div id="messages"></div>
<div id="input-area">
  <input id="input" placeholder="说点什么..." />
  <button onclick="send()">发送</button>
</div>
<script>
const BACKEND_URL = ''; // 后端部署后填这里
const messages = document.getElementById('messages');
const input = document.getElementById('input');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  
  if (!BACKEND_URL) {
    addMsg('后端还没部署，先填 BACKEND_URL', 'ai');
    return;
  }
  
  try {
    const res = await fetch(BACKEND_URL + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    addMsg(data.reply, 'ai');
  } catch (e) {
    addMsg('出错了: ' + e.message, 'ai');
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
